<!doctype html>
<html>
  <head>
    <style>
      .scroll-container {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        overflow: auto;
        border: 2px solid black;
      }
      .highlight-layer {
        position: absolute;
        top: 1rem;
        left: 1rem;
        right: 1rem;
        bottom: 5rem;
        pointer-events: none;
      }
      .highlight-layer > div {
        width: 100%;
        height: 1.625em;
      }
      .code-layer {
        position: relative;
        z-index: 10;
        font-size: 1rem;
        line-height: 1.625;
        margin: 1rem;
        padding-bottom: 5rem;
      }
    </style>
  </head>
  <body>
    <div
      style="position: relative; width: 300px; height: 300px; background: #eee"
    >
      <div class="scroll-container" id="sc">
        <div class="highlight-layer">
          <div style="background: rgba(255, 255, 0, 0.5)"></div>
          <div style="background: rgba(255, 255, 0, 0.5)"></div>
          <div style="background: rgba(255, 255, 0, 0.5)"></div>
          <div style="background: rgba(255, 255, 0, 0.5)"></div>
          <div style="background: rgba(255, 255, 0, 0.5)"></div>
        </div>
        <div class="code-layer">
          line 1<br />line 2<br />line 3<br />line 4<br />line 5<br />
          line 6<br />line 7<br />line 8<br />line 9<br />line 10<br />
          line 11<br />line 12<br />line 13<br />line 14<br />line 15<br />
        </div>
      </div>
    </div>
  </body>
</html>
