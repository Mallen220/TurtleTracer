<!DOCTYPE html>
<html>
<head>
<style>
  .scroll-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: auto;
    border: 2px solid black;
  }
  .highlight-layer {
    position: absolute;
    top: 1rem; left: 1rem; right: 1rem; bottom: 5rem;
  }
</style>
</head>
<body>
  <div style="position: relative; width: 300px; height: 300px; background: #eee;">
    <div class="scroll-container" id="sc">
      <div class="highlight-layer">
        <div style="height: 1.625em; background: red;"></div>
        <div style="height: 1.625em; background: rgba(255,255,0,0.5);"></div>
      </div>
      <div style="margin: 1rem; line-height: 1.625em;">
        1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>10<br>11<br>12<br>13<br>14<br>15<br>16<br>17<br>18<br>19<br>20<br>
      </div>
    </div>
  </div>
</body>
</html>
